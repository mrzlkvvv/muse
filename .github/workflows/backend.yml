name: Backend

on: [push, pull_request]

jobs:
  Test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend/

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"

      - name: Build
        run: go build -o /dev/null ./cmd/main.go

      - name: Test
        run: go test ./cmd/... ./internal/...

  Lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: GolangCI-Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          install-mode: binary
          working-directory: ./backend/
          args: ./cmd/... ./internal/...
